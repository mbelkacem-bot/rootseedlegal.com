<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root &amp; Seed Legal – Cabinet d'Avocats Paris | Droit des Affaires &amp; UHNWI</title>
  <meta name="description" content="Root &amp; Seed Legal, cabinet d'avocats à Paris 16e. Me Mounia Belkacem – Droit des affaires, contrats technologiques, santé, bioéthique, cybersécurité. Expertise ultra-premium pour particuliers fortunés et entreprises.">
  <meta name="keywords" content="avocat Paris, droit des affaires, cabinet avocat Paris 16, contrats technologiques, avocat UHNWI, gestion patrimoniale, avocat santé, bioéthique, cybersécurité, protection données, Root Seed Legal">
  <meta property="og:title" content="Root &amp; Seed Legal – Cabinet d'Avocats Paris">
  <meta property="og:description" content="Expertise juridique d'exception pour entrepreneurs, dirigeants et particuliers fortunés. Mounia Belkacem, Avocate au Barreau de Paris.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.rootseedlegal.com">
  <link rel="canonical" href="https://www.rootseedlegal.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ===== BRAND VARIABLES ===== */
    :root {
      --rouge:        #FF3131;
      --rouge-fonce:  #CC1F1F;
      --rouge-clair:  #FF5555;
      --rouge-pale:   rgba(255,49,49,0.12);
      --noir:         #080808;
      --noir-card:    #111111;
      --noir-border:  #1E1E1E;
      --blanc:        #F4F4F4;
      --blanc-soft:   #D8D8D8;
      --gris:         #949494;
      --transition:   all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--noir);
      color: var(--blanc);
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      line-height: 1.7;
      overflow-x: hidden;
    }
    h1, h2, h3, h4 { font-family: 'Cormorant Garamond', serif; font-weight: 600; line-height: 1.2; }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--noir); }
    ::-webkit-scrollbar-thumb { background: var(--rouge); border-radius: 2px; }

    /* ===== NAVIGATION ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 80px;
      background: rgba(8,8,8,0.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,49,49,0.15);
      transition: var(--transition);
    }
    nav.scrolled {
      height: 64px;
      background: rgba(8,8,8,0.98);
      border-bottom-color: rgba(255,49,49,0.3);
    }
    .nav-logo img {
      height: 48px;
      width: auto;
      filter: drop-shadow(0 0 8px rgba(255,49,49,0.3));
      transition: var(--transition);
    }
    .nav-logo img:hover { filter: drop-shadow(0 0 14px rgba(255,49,49,0.6)); }
    .nav-links {
      display: flex; gap: 2.5rem; align-items: center;
    }
    .nav-links a {
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--blanc-soft);
      transition: var(--transition); position: relative; padding-bottom: 4px;
    }
    .nav-links a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1.5px; background: var(--rouge);
      transition: width 0.3s ease;
    }
    .nav-links a:hover { color: var(--blanc); }
    .nav-links a:hover::after { width: 100%; }
    .nav-cta {
      background: var(--rouge); color: var(--blanc) !important;
      padding: 10px 24px; border-radius: 2px;
      font-size: 0.75rem !important; letter-spacing: 0.1em !important;
      transition: var(--transition) !important;
    }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--rouge-fonce) !important; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,49,49,0.4); }
    .nav-hamburger { display: none; cursor: pointer; flex-direction: column; gap: 5px; padding: 4px; }
    .nav-hamburger span { display: block; width: 24px; height: 2px; background: var(--blanc); transition: var(--transition); }

    /* ===== HERO ===== */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding-top: 80px;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #080808 0%, #150505 40%, #0A0A0A 100%);
    }
    .hero-bg::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(255,49,49,0.08) 0%, transparent 60%);
    }
    #hero-canvas {
      position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.4;
    }
    .hero-content {
      position: relative; z-index: 2; text-align: center;
      max-width: 900px; padding: 0 5%;
    }
    .hero-eyebrow {
      display: inline-block; margin-bottom: 1.5rem;
      font-size: 0.72rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--rouge); font-family: 'Montserrat', sans-serif; font-weight: 500;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: '——'; margin: 0 0.8em; opacity: 0.5;
    }
    .hero-title {
      font-size: clamp(3.2rem, 8vw, 7rem);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; color: var(--blanc);
      letter-spacing: -0.01em; margin-bottom: 1rem;
    }
    .hero-title em { color: var(--rouge); font-style: italic; }
    .hero-subtitle {
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: var(--gris); font-weight: 300;
      max-width: 620px; margin: 0 auto 2.5rem;
    }
    .hero-divider {
      width: 60px; height: 1px; background: var(--rouge);
      margin: 0 auto 2.5rem;
    }
    .hero-actions { display: flex; gap: 1.2rem; justify-content: center; flex-wrap: wrap; }
    .btn-primary {
      background: var(--rouge); color: var(--blanc);
      padding: 16px 36px; border: none; border-radius: 2px;
      font-family: 'Montserrat', sans-serif; font-size: 0.78rem;
      font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 24px rgba(255,49,49,0.3);
    }
    .btn-primary:hover { background: var(--rouge-fonce); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,49,49,0.5); }
    .btn-outline {
      background: transparent; color: var(--blanc);
      padding: 15px 36px; border: 1px solid rgba(244,244,244,0.25);
      border-radius: 2px;
      font-family: 'Montserrat', sans-serif; font-size: 0.78rem;
      font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase;
      cursor: pointer; transition: var(--transition);
    }
    .btn-outline:hover { border-color: var(--rouge); color: var(--rouge); transform: translateY(-2px); }
    .hero-scroll {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      opacity: 0.5; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      animation: bounce 2s infinite;
    }
    .hero-scroll span { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--rouge), transparent); }
    @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(8px)} }

    /* ===== SECTION BASE ===== */
    section { padding: 100px 5%; }
    .section-label {
      font-size: 0.68rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--rouge); font-family: 'Montserrat', sans-serif;
      margin-bottom: 1rem; display: block;
    }
    .section-title {
      font-size: clamp(2.2rem, 4vw, 3.5rem); margin-bottom: 1.2rem;
      color: var(--blanc);
    }
    .section-subtitle {
      font-size: 1rem; color: var(--gris); max-width: 600px;
      font-weight: 300; line-height: 1.8;
    }
    .section-header { margin-bottom: 4rem; }
    .title-line {
      display: inline-block; width: 40px; height: 2px;
      background: var(--rouge); margin-bottom: 1.5rem;
    }

    /* ===== STATS ===== */
    .stats {
      background: var(--noir-card);
      border-top: 1px solid var(--noir-border);
      border-bottom: 1px solid var(--noir-border);
      padding: 60px 5%;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2px; max-width: 1100px; margin: 0 auto;
    }
    .stat-item {
      text-align: center; padding: 2.5rem 1rem;
      position: relative;
    }
    .stat-item:not(:last-child)::after {
      content: ''; position: absolute; right: 0; top: 20%; bottom: 20%;
      width: 1px; background: var(--noir-border);
    }
    .stat-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.5rem; font-weight: 300; color: var(--rouge);
      line-height: 1; margin-bottom: 0.5rem; display: block;
    }
    .stat-label {
      font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gris); font-weight: 500;
    }

    /* ===== SERVICES ===== */
    .services { background: var(--noir); }
    .services-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1.5px; background: var(--noir-border);
      border: 1px solid var(--noir-border);
    }
    .service-card {
      background: var(--noir-card);
      padding: 2.8rem 2.2rem;
      transition: var(--transition);
      cursor: default; position: relative; overflow: hidden;
    }
    .service-card::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 0; background: var(--rouge);
      transition: height 0.4s ease;
    }
    .service-card:hover::before { height: 100%; }
    .service-card:hover { background: #161616; }
    .service-icon {
      font-size: 1.8rem; margin-bottom: 1.2rem; display: block;
    }
    .service-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; color: var(--rouge); letter-spacing: 0.2em;
      margin-bottom: 0.8rem; display: block;
    }
    .service-title {
      font-size: 1.35rem; margin-bottom: 0.8rem; color: var(--blanc);
    }
    .service-desc {
      font-size: 0.85rem; color: var(--gris); line-height: 1.8;
    }
    .service-tags {
      margin-top: 1.2rem; display: flex; flex-wrap: wrap; gap: 0.4rem;
    }
    .tag {
      background: var(--rouge-pale); color: var(--rouge-clair);
      padding: 3px 10px; border-radius: 2px;
      font-size: 0.68rem; letter-spacing: 0.1em;
    }

    /* ===== ABOUT / PROFIL ===== */
    .about { background: #0D0D0D; }
    .about-inner {
      display: grid; grid-template-columns: 1fr 1.3fr;
      gap: 6rem; align-items: center; max-width: 1100px; margin: 0 auto;
    }
    .about-visual {
      position: relative;
    }
    .about-logo-wrap {
      background: #F4F4F4;
      padding: 3rem 2.5rem;
      border: 1px solid var(--noir-border);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(255,49,49,0.1);
    }
    .about-logo-wrap img { max-width: 260px; width: 100%; }
    .about-logo-wrap::after {
      content: ''; position: absolute;
      bottom: -12px; right: -12px;
      width: 100%; height: 100%;
      border: 1px solid var(--rouge);
      border-radius: 4px; z-index: -1;
    }
    .about-badge {
      position: absolute; bottom: -1.5rem; left: -1.5rem;
      background: var(--rouge); color: var(--blanc);
      padding: 1rem 1.5rem; border-radius: 2px;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; line-height: 1.4;
    }
    .about-content .section-title { margin-bottom: 0.5rem; }
    .about-name {
      font-size: 1.8rem; color: var(--rouge); margin-bottom: 0.3rem;
    }
    .about-role {
      font-size: 0.8rem; color: var(--gris); letter-spacing: 0.15em;
      text-transform: uppercase; margin-bottom: 2rem; display: block;
    }
    .about-text {
      font-size: 0.9rem; color: #BBBBBB; line-height: 1.9;
      margin-bottom: 2rem; font-weight: 300;
    }
    .about-credentials {
      display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 2rem;
    }
    .credential {
      display: flex; align-items: flex-start; gap: 1rem;
      font-size: 0.82rem; color: var(--blanc-soft);
    }
    .credential::before {
      content: '▸'; color: var(--rouge); flex-shrink: 0; margin-top: 2px;
    }

    /* ===== UHNWI SECTION ===== */
    .uhnwi-teaser {
      background: linear-gradient(135deg, #0A0505 0%, #130000 50%, #0A0505 100%);
      border-top: 1px solid rgba(255,49,49,0.15);
      border-bottom: 1px solid rgba(255,49,49,0.15);
      position: relative; overflow: hidden;
    }
    .uhnwi-teaser::before {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255,49,49,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .uhnwi-inner {
      max-width: 900px; margin: 0 auto; text-align: center; position: relative; z-index: 1;
    }
    .uhnwi-inner .section-title { font-size: clamp(2.5rem, 5vw, 4rem); }
    .uhnwi-features {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 2rem; margin: 3.5rem 0;
    }
    .uhnwi-feature {
      text-align: center;
    }
    .uhnwi-feature-icon {
      width: 52px; height: 52px;
      border: 1px solid rgba(255,49,49,0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; font-size: 1.2rem;
      transition: var(--transition);
    }
    .uhnwi-feature:hover .uhnwi-feature-icon {
      background: var(--rouge-pale); border-color: var(--rouge);
    }
    .uhnwi-feature h4 {
      font-size: 1rem; color: var(--blanc); margin-bottom: 0.4rem;
    }
    .uhnwi-feature p {
      font-size: 0.8rem; color: var(--gris); line-height: 1.6;
    }

    /* ===== APPROACH ===== */
    .approach { background: var(--noir-card); }
    .approach-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem;
      max-width: 1000px; margin: 0 auto;
    }
    .approach-item {
      text-align: center; padding: 2.5rem 1.5rem;
      border: 1px solid var(--noir-border);
      border-radius: 2px; transition: var(--transition);
    }
    .approach-item:hover {
      border-color: rgba(255,49,49,0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(255,49,49,0.08);
    }
    .approach-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem; font-weight: 300; color: var(--rouge);
      opacity: 0.3; display: block; line-height: 1; margin-bottom: 1rem;
    }
    .approach-title {
      font-size: 1.3rem; margin-bottom: 0.8rem; color: var(--blanc);
    }
    .approach-text {
      font-size: 0.83rem; color: var(--gris); line-height: 1.8;
    }
    .approach-quote {
      max-width: 700px; margin: 4rem auto 0;
      text-align: center;
    }
    .approach-quote blockquote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 2.5vw, 1.9rem);
      font-style: italic; color: var(--blanc-soft);
      font-weight: 300; line-height: 1.6;
    }
    .approach-quote cite {
      display: block; margin-top: 1.2rem;
      font-size: 0.75rem; letter-spacing: 0.2em;
      color: var(--rouge); text-transform: uppercase;
    }

    /* ===== BLOG ===== */
    .blog { background: var(--noir); }
    .blog-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem;
    }
    .blog-card {
      border: 1px solid var(--noir-border);
      background: var(--noir-card);
      overflow: hidden; border-radius: 2px;
      transition: var(--transition);
    }
    .blog-card:hover {
      border-color: rgba(255,49,49,0.3);
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(255,49,49,0.1);
    }
    .blog-img {
      height: 200px; background: #161616;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; border-bottom: 1px solid var(--noir-border);
      position: relative; overflow: hidden;
    }
    .blog-img::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,49,49,0.06), transparent);
    }
    .blog-body { padding: 1.8rem; }
    .blog-category {
      font-size: 0.68rem; color: var(--rouge); letter-spacing: 0.2em;
      text-transform: uppercase; margin-bottom: 0.8rem; display: block;
    }
    .blog-title {
      font-size: 1.25rem; color: var(--blanc); margin-bottom: 0.8rem;
      line-height: 1.3;
    }
    .blog-excerpt {
      font-size: 0.82rem; color: var(--gris); line-height: 1.7;
      margin-bottom: 1.2rem;
    }
    .blog-link {
      font-size: 0.75rem; color: var(--rouge); letter-spacing: 0.15em;
      text-transform: uppercase; font-weight: 600;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .blog-link::after { content: '→'; transition: var(--transition); }
    .blog-card:hover .blog-link::after { transform: translateX(4px); }

    /* ===== CONTACT ===== */
    .contact { background: #0D0D0D; }
    .contact-inner {
      display: grid; grid-template-columns: 1fr 1.4fr;
      gap: 6rem; max-width: 1100px; margin: 0 auto;
    }
    .contact-info h3 {
      font-size: 2.2rem; margin-bottom: 2rem;
    }
    .contact-detail {
      display: flex; align-items: flex-start; gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .contact-icon {
      width: 40px; height: 40px; border: 1px solid rgba(255,49,49,0.3);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; color: var(--rouge);
    }
    .contact-detail-text strong {
      display: block; font-size: 0.72rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gris); margin-bottom: 0.3rem;
    }
    .contact-detail-text span, .contact-detail-text a {
      font-size: 0.9rem; color: var(--blanc-soft);
      transition: var(--transition);
    }
    .contact-detail-text a:hover { color: var(--rouge); }
    .contact-form { background: var(--noir-card); padding: 3rem; border: 1px solid var(--noir-border); border-radius: 2px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .form-group label {
      font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--gris); font-weight: 500;
    }
    .form-group input, .form-group select, .form-group textarea {
      background: #161616; border: 1px solid var(--noir-border);
      color: var(--blanc); padding: 12px 16px;
      font-family: 'Montserrat', sans-serif; font-size: 0.88rem;
      border-radius: 2px; transition: var(--transition); outline: none;
      width: 100%;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--rouge); box-shadow: 0 0 0 3px rgba(255,49,49,0.08);
    }
    .form-group textarea { min-height: 130px; resize: vertical; }
    .form-group select { appearance: none; cursor: pointer; }
    .form-submit {
      width: 100%; padding: 16px;
      background: var(--rouge); color: var(--blanc); border: none;
      font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
      font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase;
      cursor: pointer; border-radius: 2px; transition: var(--transition);
    }
    .form-submit:hover { background: var(--rouge-fonce); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,49,49,0.4); }
    .form-note {
      font-size: 0.72rem; color: var(--gris); text-align: center;
      margin-top: 1rem; line-height: 1.6;
    }
    #form-success {
      display: none; text-align: center; padding: 2rem;
      color: var(--blanc);
    }
    #form-success h3 { color: var(--rouge); margin-bottom: 1rem; }

    /* ===== FOOTER ===== */
    footer {
      background: var(--noir-card);
      border-top: 1px solid var(--noir-border);
      padding: 60px 5% 30px;
    }
    .footer-top {
      display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr;
      gap: 3rem; margin-bottom: 3rem;
    }
    .footer-brand img {
      height: 44px; width: auto; margin-bottom: 1.2rem;
      background: #F4F4F4; padding: 8px 12px; border-radius: 3px;
    }
    .footer-brand p {
      font-size: 0.82rem; color: var(--gris); line-height: 1.7;
      max-width: 260px;
    }
    .footer-col h5 {
      font-size: 0.72rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--rouge); margin-bottom: 1.2rem; font-family: 'Montserrat', sans-serif; font-weight: 600;
